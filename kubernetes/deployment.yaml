apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app
  namespace: webapp
  labels:
    app.kubernetes.io/name: react-app
    app.kubernetes.io/version: "${APP_VERSION}"
    app.kubernetes.io/managed-by: gitlab-ci
    app.kubernetes.io/part-of: react-k8s-demo
  annotations:
    kubernetes.io/change-cause: "pipeline=${CI_PIPELINE_ID} sha=${IMAGE_TAG} version=${APP_VERSION}"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: react-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: react-app
        app.kubernetes.io/version: "${APP_VERSION}"
        app.kubernetes.io/managed-by: gitlab-ci
        app.kubernetes.io/part-of: react-k8s-demo
      annotations:
        deploy-timestamp: "${DEPLOY_TIME}"
    spec:
      serviceAccountName: react-app
      automountServiceAccountToken: false
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: react-app
      containers:
        - name: react-app
          image: "${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          startupProbe:
            httpGet:
              path: /
              port: 8080
            failureThreshold: 6
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 101
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
      imagePullSecrets:
        - name: react-app-registry-auth
      securityContext:
        seccompProfile:
          type: RuntimeDefault
