<rect x="185" y="290" width="85" height="22" rx="5" stroke-width="0.5" class="box-teal"/>
<text class="ts" x="227" y="301" text-anchor="middle" dominant-baseline="central">worker node</text>
<!-- Namespaces -->
<rect x="38" y="323" width="182" height="80" rx="8" stroke-width="0.5" class="box-teal"/>
<text class="th" x="129" y="343" text-anchor="middle" dominant-baseline="central">ingress-nginx</text>
<text class="ts" x="129" y="360" text-anchor="middle" dominant-baseline="central">nginx-ingress-controller</text>
