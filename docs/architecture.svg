<text class="ts" x="129" y="392" text-anchor="middle" dominant-baseline="central">routes by Host header</text>
<rect x="236" y="323" width="208" height="80" rx="8" stroke-width="0.5" class="box-teal"/>
<text class="th" x="340" y="343" text-anchor="middle" dominant-baseline="central">webapp</text>
<text class="ts" x="340" y="360" text-anchor="middle" dominant-baseline="central">Deployment/react-app · 2 pods</text>
<text class="ts" x="340" y="376" text-anchor="middle" dominant-baseline="central">Service · Ingress · HPA · PDB</text>
<text class="ts" x="340" y="392" text-anchor="middle" dominant-baseline="central">ServiceAccount · pull secret</text>
<rect x="460" y="323" width="182" height="80" rx="8" stroke-width="0.5" class="box-teal"/>
<text class="th" x="551" y="343" text-anchor="middle" dominant-baseline="central">monitoring</text>
<text class="ts" x="551" y="360" text-anchor="middle" dominant-baseline="central">Prometheus Operator</text>
<text class="ts" x="551" y="376" text-anchor="middle" dominant-baseline="central">Grafana + Alertmanager</text>
<text class="ts" x="551" y="392" text-anchor="middle" dominant-baseline="central">node-exporter · kube-state</text>
<!-- Internal arrows -->
<line x1="220" y1="363" x2="234" y2="363" stroke="#1D9E75" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
<line x1="444" y1="363" x2="458" y2="363" stroke="#1D9E75" stroke-width="1" stroke-dasharray="3 2" fill="none" marker-end="url(#arrow)"/>
<!-- ngrok -->
<rect x="160" y="418" width="360" height="56" rx="8" stroke-width="0.5" class="box-amber"/>
<text class="th" x="340" y="440" text-anchor="middle" dominant-baseline="central">ngrok tunnel</text>
<text class="ts" x="340" y="460" text-anchor="middle" dominant-baseline="central">localhost:80 → https://id.ngrok-free.app</text>
<line x1="340" y1="403" x2="340" y2="418" stroke="#888780" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="496" text-anchor="middle" dominant-baseline="central">Public URL — share with reviewer to demonstrate live app</text>
</svg>
