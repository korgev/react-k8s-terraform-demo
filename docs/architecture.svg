<text class="ts" x="301" y="228" text-anchor="middle">kubectl apply + image pull</text>
<line x1="301" y1="215" x2="301" y2="243" class="arr" marker-end="url(#arrow)" stroke-width="1.4"/>
<!-- Arrow: terraform → Kind cluster -->
<path d="M 85 145 L 85 192 L 160 192 L 160 260 L 168 260" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="110" y="210" dominant-baseline="central">provision</text>
<!-- Kind Cluster -->
<rect x="20" y="253" width="640" height="240" rx="14" stroke-width="0.5" class="box-teal"/>
