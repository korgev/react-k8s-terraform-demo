<svg width="100%" viewBox="0 0 680 510" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, sans-serif; fill: #2C2C2A; }
    .th  { font-size: 14px; font-weight: 500; }
    .ts  { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .box-gray     { fill: #F1EFE8; stroke: #888780; }
    .box-purple   { fill: #EEEDFE; stroke: #7F77DD; }
    .box-teal     { fill: #E1F5EE; stroke: #1D9E75; }
    .box-amber    { fill: #FAEEDA; stroke: #BA7517; }
    .arr { fill: none; stroke: #888780; stroke-width: 1.2; }
  </style>
</defs>
<!-- Developer -->
<rect x="20" y="30" width="130" height="115" rx="12" stroke-width="0.5" class="box-gray"/>
<text class="th" x="85" y="56" text-anchor="middle" dominant-baseline="central">Developer</text>
<text class="ts" x="85" y="73" text-anchor="middle" dominant-baseline="central">macOS M-series</text>
<rect x="33" y="85" width="104" height="28" rx="6" stroke-width="0.5" class="box-gray"/>
<text class="ts" x="85" y="99" text-anchor="middle" dominant-baseline="central">git push → main</text>
<rect x="33" y="120" width="104" height="18" rx="4" stroke-width="0.5" class="box-gray"/>
<text class="ts" x="85" y="129" text-anchor="middle" dominant-baseline="central">terraform apply</text>
<!-- Arrow: Developer → GitLab -->
<text class="ts" x="162" y="100" text-anchor="middle" dominant-baseline="central">push</text>
<line x1="150" y1="85" x2="188" y2="78" class="arr" marker-end="url(#arrow)"/>
<!-- GitLab.com -->
<rect x="192" y="30" width="218" height="185" rx="12" stroke-width="0.5" class="box-purple"/>
<text class="th" x="301" y="55" text-anchor="middle" dominant-baseline="central">GitLab.com</text>
<text class="ts" x="301" y="71" text-anchor="middle" dominant-baseline="central">free SaaS</text>
<rect x="207" y="83" width="188" height="35" rx="6" stroke-width="0.5" class="box-purple"/>
<text class="th" x="301" y="97" text-anchor="middle" dominant-baseline="central">Repository</text>
<text class="ts" x="301" y="111" text-anchor="middle" dominant-baseline="central">source code + manifests</text>
<rect x="207" y="128" width="188" height="38" rx="6" stroke-width="0.5" class="box-purple"/>
<text class="th" x="301" y="143" text-anchor="middle" dominant-baseline="central">CI/CD Pipeline</text>
<text class="ts" x="301" y="158" text-anchor="middle" dominant-baseline="central">build → push → deploy → rollback</text>
<rect x="207" y="176" width="188" height="28" rx="6" stroke-width="0.5" class="box-purple"/>
<text class="th" x="301" y="190" text-anchor="middle" dominant-baseline="central">Container Registry</text>
