# =============================================================================
# GitLab CI/CD Pipeline — react-k8s-terraform-demo
# Executor: shell (runs directly on macOS — no Docker-in-Docker needed)
#
# Stages:
#   build    → npm ci + vite build → dist/ artifact
#   docker   → docker build + push to GitLab Container Registry
#   deploy   → kubectl apply deployment.yaml
#   rollback → manual one-click rollback
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   KUBE_CONFIG   base64-encoded kubeconfig   Protected ✅  Masked ✅
#
# Auto-provided by GitLab CE:
#   CI_REGISTRY            192.168.2.2:5050
#   CI_REGISTRY_USER       auto-scoped per pipeline
#   CI_REGISTRY_PASSWORD   auto-scoped per pipeline
#   CI_REGISTRY_IMAGE      192.168.2.2:5050/rwx/react-k8s-terraform-demo
# =============================================================================

stages:
  - build
  - docker
  - deploy
  - rollback

# Global defaults
default:
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# Shared variables
variables:
  IMAGE_REPOSITORY: "$CI_REGISTRY_IMAGE/react-app"
  IMAGE_TAG:        "$CI_COMMIT_SHORT_SHA"
  IMAGE_FULL:       "$CI_REGISTRY_IMAGE/react-app:$CI_COMMIT_SHORT_SHA"
  IMAGE_LATEST:     "$CI_REGISTRY_IMAGE/react-app:latest"
  K8S_NAMESPACE:    "webapp"
  APP_NAME:         "react-app"

# =============================================================================
# STAGE 1 — Build React Application
# Shell executor: uses node/npm already installed on Mac
# =============================================================================
build:react:
  stage: build
  before_script:
    - node --version
    - npm --version
    - cd app
    - npm ci --prefer-offline --no-audit
  script:
    - echo "Building React app — $CI_COMMIT_SHORT_SHA"
    - |
      VITE_APP_VERSION="v1.0.$CI_PIPELINE_IID" \
      VITE_COMMIT_SHA="$CI_COMMIT_SHA" \
      VITE_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
      VITE_ENVIRONMENT="production" \
      VITE_CLUSTER_NAME="react-k8s-cluster" \
      npm run build
    - echo "Build complete — $(du -sh dist/ | cut -f1) bundle"
  artifacts:
    paths:
      - app/dist/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# =============================================================================
# STAGE 2 — Docker Build & Push
# Shell executor: uses local OrbStack Docker daemon directly (no DinD)
# =============================================================================
docker:build-push:
  stage: docker
  needs:
    - job: build:react
      artifacts: true
  before_script:
    - docker version
    # Login to local GitLab CE Container Registry
    # Allow insecure registry since we use HTTP not HTTPS
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - echo "Building Docker image $IMAGE_FULL"
    - |
      docker build \
        --build-arg VITE_APP_VERSION="v1.0.$CI_PIPELINE_IID" \
        --build-arg VITE_COMMIT_SHA="$CI_COMMIT_SHA" \
        --build-arg VITE_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --build-arg VITE_ENVIRONMENT="production" \
        --build-arg VITE_CLUSTER_NAME="react-k8s-cluster" \
        --label "org.opencontainers.image.source=$CI_PROJECT_URL" \
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" \
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --label "org.opencontainers.image.version=v1.0.$CI_PIPELINE_IID" \
        -t "$IMAGE_FULL" \
        -t "$IMAGE_LATEST" \
        app/
    - echo "Pushing to GitLab Container Registry..."
    - docker push "$IMAGE_FULL"
    - docker push "$IMAGE_LATEST"
    - echo "Pushed $IMAGE_FULL"
    - echo "IMAGE_FULL=$IMAGE_FULL" >> build.env
    - echo "IMAGE_TAG=$IMAGE_TAG" >> build.env
    - echo "IMAGE_REPOSITORY=$IMAGE_REPOSITORY" >> build.env
    - echo "APP_VERSION=v1.0.$CI_PIPELINE_IID" >> build.env
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# =============================================================================
# STAGE 3 — Deploy to Kubernetes
# Shell executor: uses kubectl already installed on Mac
# kubeconfig written from base64 CI variable
# =============================================================================
deploy:kubernetes:
  stage: deploy
  needs:
    - job: docker:build-push
      artifacts: true
  before_script:
    - kubectl version --client
    # Write kubeconfig from base64 CI variable
    # macOS base64 decode flag is -D (not -d like Linux)
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -D > ~/.kube/config
    - chmod 600 ~/.kube/config
    # Verify cluster is reachable
    - kubectl cluster-info --request-timeout=10s
    - echo "Deploying $IMAGE_FULL to $K8S_NAMESPACE"
  script:
    # Save previous image for rollback record
    - |
      PREVIOUS_IMAGE=$(
        kubectl get deployment "$APP_NAME" -n "$K8S_NAMESPACE" \
          -o jsonpath='{.spec.template.spec.containers[0].image}' \
          2>/dev/null || echo "none"
      )
      echo "Previous image: $PREVIOUS_IMAGE"
      echo "PREVIOUS_IMAGE=$PREVIOUS_IMAGE" >> rollback.env

    # Substitute placeholders in deployment manifest
    # envsubst is part of gettext — install if missing: brew install gettext
    - |
      export DEPLOY_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      envsubst < kubernetes/deployment.yaml > /tmp/deployment-rendered.yaml

    - echo "Rendered deployment manifest:"
    - cat /tmp/deployment-rendered.yaml

    # Apply deployment — handles both first-run create and updates
    - kubectl apply -f /tmp/deployment-rendered.yaml

    # Wait for rollout with auto-rollback on failure
    - |
      echo "Waiting for rollout (timeout 180s)..."
      if ! kubectl rollout status deployment/"$APP_NAME" \
          -n "$K8S_NAMESPACE" \
          --timeout=180s; then
        echo "Rollout failed — triggering automatic rollback"
        kubectl rollout undo deployment/"$APP_NAME" -n "$K8S_NAMESPACE"
        kubectl rollout status deployment/"$APP_NAME" -n "$K8S_NAMESPACE" --timeout=60s
        echo "Rolled back to: $PREVIOUS_IMAGE"
        exit 1
      fi

    - kubectl get pods -n "$K8S_NAMESPACE" -l "app.kubernetes.io/name=$APP_NAME"
    - |
      ACTIVE_IMAGE=$(kubectl get deployment "$APP_NAME" -n "$K8S_NAMESPACE" \
        -o jsonpath='{.spec.template.spec.containers[0].image}')
      echo "Deployment complete"
      echo "  Active image : $ACTIVE_IMAGE"
      echo "  Namespace    : $K8S_NAMESPACE"
      echo "  Pipeline     : $CI_PIPELINE_ID"

  after_script:
    - echo "=== Pod status at job end ==="
    - kubectl get pods -n webapp --kubeconfig ~/.kube/config || true
    - echo "=== Recent events ==="
    - kubectl get events -n webapp --sort-by='.lastTimestamp' --kubeconfig ~/.kube/config | tail -15 || true

  artifacts:
    reports:
      dotenv: rollback.env
    expire_in: 7 days

  environment:
    name: production
    url: http://webapp.local

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# =============================================================================
# STAGE 4 — Manual Rollback
# Triggered manually from GitLab UI
# =============================================================================
rollback:kubernetes:
  stage: rollback
  needs:
    - job: deploy:kubernetes
      artifacts: true
  when: manual
  allow_failure: false
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -D > ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - echo "Manual rollback triggered by $GITLAB_USER_LOGIN"
    - echo "  Rolling back from $IMAGE_FULL"
    - echo "  Rolling back to   $PREVIOUS_IMAGE"
    - kubectl rollout undo deployment/"$APP_NAME" -n "$K8S_NAMESPACE"
    - kubectl rollout status deployment/"$APP_NAME" -n "$K8S_NAMESPACE" --timeout=120s
    - echo "Rollback complete"
    - |
      ACTIVE=$(kubectl get deployment "$APP_NAME" -n "$K8S_NAMESPACE" \
        -o jsonpath='{.spec.template.spec.containers[0].image}')
      echo "  Now running: $ACTIVE"
    - kubectl get pods -n "$K8S_NAMESPACE" -l "app.kubernetes.io/name=$APP_NAME"

  environment:
    name: production
    action: prepare

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
