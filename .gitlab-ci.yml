# ─────────────────────────────────────────────────────────────────────────────
# GitLab CI/CD Pipeline — k8s-webapp
#
# Stages:
#   build   → compile React + produce dist/ artifact
#   docker  → multi-stage Docker build + push to GitLab Container Registry
#   deploy  → kubectl apply deployment.yaml (first run or update)
#   rollback→ manual one-click rollback to previous revision
#
# Required GitLab CI/CD Variables (Settings → CI/CD → Variables → Expand):
#
#   KUBE_CONFIG   base64-encoded kubeconfig    Protected ✅  Masked ✅
#
# Auto-provided by GitLab (no manual setup needed):
#   CI_REGISTRY            registry.gitlab.com
#   CI_REGISTRY_USER       auto-scoped to this pipeline
#   CI_REGISTRY_PASSWORD   auto-scoped to this pipeline
#   CI_REGISTRY_IMAGE      registry.gitlab.com/<user>/<project>
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - build
  - docker
  - deploy
  - rollback

# ── Global defaults ───────────────────────────────────────────────────────────
default:
  interruptible: true   # cancel stale pipelines when new commit arrives
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ── Shared variables ─────────────────────────────────────────────────────────
variables:
  # Full image path — tagged with immutable git SHA for traceability
  IMAGE_REPOSITORY: "$CI_REGISTRY_IMAGE/react-app"
  IMAGE_TAG:        "$CI_COMMIT_SHORT_SHA"
  IMAGE_FULL:       "$CI_REGISTRY_IMAGE/react-app:$CI_COMMIT_SHORT_SHA"
  IMAGE_LATEST:     "$CI_REGISTRY_IMAGE/react-app:latest"

  # K8s target
  K8S_NAMESPACE: "webapp"
  APP_NAME:      "react-app"

  # Docker-in-Docker settings
  DOCKER_DRIVER:      "overlay2"
  DOCKER_TLS_CERTDIR: ""   # disable TLS for DinD simplicity in CI

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — Build React Application
# ─────────────────────────────────────────────────────────────────────────────
build:react:
  stage: build
  image: node:20.11-alpine3.19
  cache:
    key:
      files:
        - app/package-lock.json
    paths:
      - app/node_modules/
  before_script:
    - cd app
    - npm ci --prefer-offline --no-audit
  script:
    - echo "▶ Building React app — $CI_COMMIT_SHORT_SHA"
    - |
      VITE_APP_VERSION="v1.0.$CI_PIPELINE_IID" \
      VITE_COMMIT_SHA="$CI_COMMIT_SHA" \
      VITE_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
      VITE_ENVIRONMENT="production" \
      VITE_CLUSTER_NAME="react-k8s-cluster" \
      npm run build
    - echo "✅ Build complete — $(du -sh dist/ | cut -f1) bundle"
  artifacts:
    # Pass dist/ to docker stage — avoids rebuilding inside Docker
    paths:
      - app/dist/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — Docker Build & Push
# ─────────────────────────────────────────────────────────────────────────────
docker:build-push:
  stage: docker
  image: docker:25.0-cli
  services:
    - docker:25.0-dind
  needs:
    - job: build:react
      artifacts: true
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - echo "▶ Building Docker image $IMAGE_FULL"
    - |
      docker build \
        --build-arg VITE_APP_VERSION="v1.0.$CI_PIPELINE_IID" \
        --build-arg VITE_COMMIT_SHA="$CI_COMMIT_SHA" \
        --build-arg VITE_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --build-arg VITE_ENVIRONMENT="production" \
        --build-arg VITE_CLUSTER_NAME="react-k8s-cluster" \
        --label "org.opencontainers.image.source=$CI_PROJECT_URL" \
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" \
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --label "org.opencontainers.image.version=v1.0.$CI_PIPELINE_IID" \
        -t "$IMAGE_FULL" \
        -t "$IMAGE_LATEST" \
        app/
    - echo "▶ Pushing to GitLab Container Registry..."
    - docker push "$IMAGE_FULL"
    - docker push "$IMAGE_LATEST"
    - echo "✅ Pushed $IMAGE_FULL"
    # Export for downstream jobs via dotenv artifact
    - echo "IMAGE_FULL=$IMAGE_FULL" >> build.env
    - echo "IMAGE_TAG=$IMAGE_TAG" >> build.env
    - echo "IMAGE_REPOSITORY=$IMAGE_REPOSITORY" >> build.env
    - echo "APP_VERSION=v1.0.$CI_PIPELINE_IID" >> build.env
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 — Deploy to Kubernetes
# ─────────────────────────────────────────────────────────────────────────────
deploy:kubernetes:
  stage: deploy
  image: alpine:3.19
  needs:
    - job: docker:build-push
      artifacts: true
  before_script:
    # Install kubectl + envsubst (gettext)
    - apk add --no-cache curl gettext bash
    - |
      curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
      chmod +x kubectl && mv kubectl /usr/local/bin/
    # Write kubeconfig — stored as base64 CI variable
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
    - chmod 600 ~/.kube/config
    # Verify cluster connectivity before doing anything
    - kubectl cluster-info --request-timeout=10s
    - echo "▶ Deploying $IMAGE_FULL to $K8S_NAMESPACE"
  script:
    # ── Save previous image for rollback record ───────────────────────────────
    - |
      PREVIOUS_IMAGE=$(
        kubectl get deployment "$APP_NAME" -n "$K8S_NAMESPACE" \
          -o jsonpath='{.spec.template.spec.containers[0].image}' \
          2>/dev/null || echo "none"
      )
      echo "Previous image: $PREVIOUS_IMAGE"
      echo "PREVIOUS_IMAGE=$PREVIOUS_IMAGE" >> rollback.env

    # ── Substitute placeholders in deployment manifest ────────────────────────
    # envsubst replaces ${IMAGE_REPOSITORY}, ${IMAGE_TAG}, ${APP_VERSION},
    # ${DEPLOY_TIME}, ${CI_PIPELINE_ID} with their current values
    - |
      export DEPLOY_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      envsubst < kubernetes/deployment.yaml > /tmp/deployment-rendered.yaml

    # Print rendered manifest to job log for auditability
    - echo "▶ Rendered deployment manifest:"
    - cat /tmp/deployment-rendered.yaml

    # ── Apply the deployment ──────────────────────────────────────────────────
    # kubectl apply handles both first-time create AND subsequent updates.
    # This eliminates the chicken-and-egg problem with 'kubectl set image'.
    - |
      kubectl apply -f /tmp/deployment-rendered.yaml

    # ── Wait for rollout ──────────────────────────────────────────────────────
    # Timeout: 3 minutes. If it fails, automatically roll back.
    - |
      echo "▶ Waiting for rollout (timeout 180s)..."
      if ! kubectl rollout status deployment/"$APP_NAME" \
          -n "$K8S_NAMESPACE" \
          --timeout=180s; then
        echo "❌ Rollout failed — triggering automatic rollback"
        kubectl rollout undo deployment/"$APP_NAME" -n "$K8S_NAMESPACE"
        kubectl rollout status deployment/"$APP_NAME" -n "$K8S_NAMESPACE" --timeout=60s
        echo "⚠️  Rolled back to: $PREVIOUS_IMAGE"
        exit 1
      fi

    # ── Verify and summarise ──────────────────────────────────────────────────
    - kubectl get pods -n "$K8S_NAMESPACE" -l "app.kubernetes.io/name=$APP_NAME"
    - |
      ACTIVE_IMAGE=$(kubectl get deployment "$APP_NAME" -n "$K8S_NAMESPACE" \
        -o jsonpath='{.spec.template.spec.containers[0].image}')
      echo "✅ Deployment complete"
      echo "   Active image : $ACTIVE_IMAGE"
      echo "   Namespace    : $K8S_NAMESPACE"
      echo "   Pipeline     : $CI_PIPELINE_ID"

  after_script:
    # Always print pod status — even on failure (for debugging)
    - |
      export KUBECONFIG=~/.kube/config
      echo "=== Pod status at job end ==="
      kubectl get pods -n webapp || true
      echo "=== Recent events ==="
      kubectl get events -n webapp --sort-by='.lastTimestamp' | tail -15 || true

  artifacts:
    reports:
      dotenv: rollback.env
    expire_in: 7 days

  environment:
    name: production
    url: http://webapp.local

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 4 — Manual Rollback
# ─────────────────────────────────────────────────────────────────────────────
rollback:kubernetes:
  stage: rollback
  image: alpine:3.19
  needs:
    - job: deploy:kubernetes
      artifacts: true
  when: manual           # only runs when you click "Run" in GitLab UI
  allow_failure: false
  before_script:
    - apk add --no-cache curl bash
    - |
      curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
      chmod +x kubectl && mv kubectl /usr/local/bin/
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - echo "⚠️  Manual rollback triggered by: $GITLAB_USER_LOGIN"
    - echo "   Rolling back from: $IMAGE_FULL"
    - echo "   Rolling back to:   $PREVIOUS_IMAGE"

    # kubectl rollout undo reverts to the previous ReplicaSet
    # Kubernetes keeps the last 10 revisions by default (revisionHistoryLimit)
    - kubectl rollout undo deployment/"$APP_NAME" -n "$K8S_NAMESPACE"
    - kubectl rollout status deployment/"$APP_NAME" -n "$K8S_NAMESPACE" --timeout=120s

    - echo "✅ Rollback complete"
    - |
      ACTIVE=$(kubectl get deployment "$APP_NAME" -n "$K8S_NAMESPACE" \
        -o jsonpath='{.spec.template.spec.containers[0].image}')
      echo "   Now running: $ACTIVE"
    - kubectl get pods -n "$K8S_NAMESPACE" -l "app.kubernetes.io/name=$APP_NAME"

  environment:
    name: production
    action: prepare

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
