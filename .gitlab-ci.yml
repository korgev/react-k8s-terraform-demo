stages:
  - test
  - docker
  - deploy
  - rollback

default:
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  IMAGE_REPOSITORY: "$CI_REGISTRY_IMAGE/react-app"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  IMAGE_FULL: "$CI_REGISTRY_IMAGE/react-app:$CI_COMMIT_SHORT_SHA"
  IMAGE_LATEST: "$CI_REGISTRY_IMAGE/react-app:latest"
  K8S_NAMESPACE: "webapp"
  APP_NAME: "react-app"

test:build:
  stage: test
  before_script:
    - node --version
    - npm --version
    - cd app
    - npm ci --prefer-offline --no-audit
  script:
    - npm run lint
    - VITE_APP_VERSION="v1.0.$CI_PIPELINE_IID" VITE_COMMIT_SHA="$CI_COMMIT_SHA" VITE_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" VITE_ENVIRONMENT="production" VITE_CLUSTER_NAME="react-k8s-cluster" npm run build
    - echo "Build size $(du -sh dist/ | cut -f1)"
  artifacts:
    paths:
      - app/dist/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

docker:build-push:
  stage: docker
  needs:
    - job: test:build
      artifacts: true
  before_script:
    - docker version --format "Docker {{.Client.Version}}"
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build --build-arg VITE_APP_VERSION="v1.0.$CI_PIPELINE_IID" --build-arg VITE_COMMIT_SHA="$CI_COMMIT_SHA" --build-arg VITE_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" --build-arg VITE_ENVIRONMENT="production" --build-arg VITE_CLUSTER_NAME="react-k8s-cluster" --label "org.opencontainers.image.source=$CI_PROJECT_URL" --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" -t "$IMAGE_FULL" -t "$IMAGE_LATEST" app/
    - docker push "$IMAGE_FULL"
    - docker push "$IMAGE_LATEST"
    - echo "IMAGE_FULL=$IMAGE_FULL" >> build.env
    - echo "IMAGE_TAG=$IMAGE_TAG" >> build.env
    - echo "IMAGE_REPOSITORY=$IMAGE_REPOSITORY" >> build.env
    - echo "APP_VERSION=v1.0.$CI_PIPELINE_IID" >> build.env
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy:kubernetes:
  stage: deploy
  needs:
    - job: docker:build-push
      artifacts: true
  before_script:
    - kubectl version --client
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -D > ~/.kube/config
    - chmod 600 ~/.kube/config
    - kubectl cluster-info --request-timeout=10s
  script:
    - PREVIOUS_IMAGE=$(kubectl get deployment "$APP_NAME" -n "$K8S_NAMESPACE" -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "none")
    - echo "Previous image $PREVIOUS_IMAGE"
    - echo "PREVIOUS_IMAGE=$PREVIOUS_IMAGE" >> rollback.env
    - export DEPLOY_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
    - envsubst < kubernetes/deployment.yaml > /tmp/deployment-rendered.yaml
    - kubectl apply -f /tmp/deployment-rendered.yaml
    - kubectl rollout status deployment/"$APP_NAME" -n "$K8S_NAMESPACE" --timeout=180s || (kubectl rollout undo deployment/"$APP_NAME" -n "$K8S_NAMESPACE" && exit 1)
    - kubectl get pods -n "$K8S_NAMESPACE" -l "app.kubernetes.io/name=$APP_NAME"
  after_script:
    - kubectl get pods -n webapp --kubeconfig ~/.kube/config 2>/dev/null || true
  artifacts:
    reports:
      dotenv: rollback.env
    expire_in: 7 days
  environment:
    name: production
    url: http://webapp.local
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

rollback:kubernetes:
  stage: rollback
  needs:
    - job: deploy:kubernetes
      artifacts: true
  when: manual
  allow_failure: false
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -D > ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - echo "Manual rollback by $GITLAB_USER_LOGIN"
    - kubectl rollout undo deployment/"$APP_NAME" -n "$K8S_NAMESPACE"
    - kubectl rollout status deployment/"$APP_NAME" -n "$K8S_NAMESPACE" --timeout=120s
    - kubectl get pods -n "$K8S_NAMESPACE" -l "app.kubernetes.io/name=$APP_NAME"
  environment:
    name: production
    action: prepare
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
